server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus?currentSchema=orders
    username: nexus
    password: nexus
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: orders
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    schemas: orders
    default-schema: orders
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.nexus.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: order-service

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"order-service","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","message":"%m"}%n'
