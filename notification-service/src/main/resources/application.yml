server:
  port: 8084

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus?currentSchema=notifications
    username: nexus
    password: nexus
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notifications
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    schemas: notifications
    default-schema: notifications
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: notification-service

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"notification-service","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","correlationId":"%X{correlationId:-}","message":"%m"}%n'
