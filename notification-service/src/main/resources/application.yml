server:
  port: 8084

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.nexus.*
        spring.json.type.mapping: >
          OrderConfirmed:com.nexus.notification.domain.event.OrderConfirmed,
          OrderCancelled:com.nexus.notification.domain.event.OrderCancelled,
          PaymentFailed:com.nexus.notification.domain.event.PaymentFailed

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: notification-service

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","service":"notification-service","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","correlationId":"%X{correlationId:-}","message":"%m"}%n'
